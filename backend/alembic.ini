# =============================================================
# 임진강김치 MES 시스템 - Alembic 설정 파일
# =============================================================

[alembic]
# 마이그레이션 스크립트 위치
script_location = alembic

# 마이그레이션 파일 이름 형식 (타임스탬프_슬러그.py)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 시스템 시간대
# timezone =

# 마이그레이션 파일 최대 길이
truncate_slug_length = 40

# alembic 버전 테이블 이름
version_table = alembic_version

# 소스 인코딩
source_encoding = utf-8

# output_encoding
output_encoding = utf-8

# 데이터베이스 연결 URL
# 실제 운영 환경에서는 env.py 의 환경변수로 override 됩니다
sqlalchemy.url = mysql+pymysql://mes_user:mes_password@localhost:3306/mes_db?charset=utf8mb4

# =============================================================
# 로깅 설정
# =============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
